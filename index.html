<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 本地 PDF 搜尋</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- 引入 PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📑 AI 本地文件搜尋</h1>
            <div id="status" class="status-badge">正在載入 AI 模型...</div>
        </header>

        <main>
            <section class="upload-section">
                <label for="pdf-upload" class="custom-file-upload">
                    選擇 PDF 文件上傳
                </label>
                <input type="file" id="pdf-upload" accept=".pdf" style="display:none;">
            </section>

            <section id="search-area" class="search-section" style="display:none;">
                <div class="search-group">
                    <input type="text" id="query" placeholder="輸入關於文件的問題...">
                    <button id="search-btn">搜尋</button>
                </div>
            </section>

            <section id="results" class="results-section"></section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
