<!DOCTYPE html>
<html lang="zh-TW">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#00ff88"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <link
    rel="manifest"
    href="manifest.json"
  >

  <title>YOLO AI</title>

  <!--<link
    rel="stylesheet"
    href="style.css"
  >-->

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {

  width: 100vw;
  height: 100vh;

  overflow: hidden;

  background: black;

  font-family: Arial;
}

.app {

  width: 100%;
  height: 100%;

  position: relative;
}

.topbar {

  position: fixed;

  top: 0;
  left: 0;

  width: 100%;

  padding: 15px;

  background: rgba(0,0,0,0.7);

  color: white;

  text-align: center;

  font-size: 20px;
  font-weight: bold;

  z-index: 100;
}

.camera-container {

  width: 100%;
  height: 100%;

  position: relative;

  overflow: hidden;
}

video {

  width: 100%;
  height: 100%;

  object-fit: cover;

  background: black;
}

canvas {

  position: absolute;

  left: 0;
  top: 0;

  width: 100%;
  height: 100%;

  pointer-events: none;
}

.bottom-ui {

  position: fixed;

  bottom: 20px;

  width: 100%;

  display: flex;

  flex-direction: column;

  align-items: center;

  gap: 10px;

  z-index: 100;
}

#startBtn {

  padding: 15px 30px;

  border: none;

  border-radius: 50px;

  background: #00ff88;

  color: black;

  font-size: 18px;
  font-weight: bold;
}

#fps {

  color: white;

  background: rgba(0,0,0,0.6);

  padding: 8px 15px;

  border-radius: 20px;
}
  </style>

</head>

<body>

  <div class="app">

    <div class="topbar">
      YOLO AI Detection
    </div>

    <div class="camera-container">

      <video
        id="video"
        autoplay
        playsinline
        muted
      ></video>

      <canvas id="canvas"></canvas>

    </div>

    <div class="bottom-ui">

      <button id="startBtn" disabled>
        開始偵測
      </button>

      <div id="fps">
        FPS: 0
      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
