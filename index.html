<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YOLO Webcam</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

  <h1>YOLO Webcam Detection</h1>

  <button id="startBtn">
    Start Camera
  </button>

  <div class="container">

    <video
      id="video"
      autoplay
      playsinline
      muted
    ></video>

    <canvas id="canvas"></canvas>

  </div>

  <script src="app.js"></script>

</body>
</html>
