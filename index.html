<!DOCTYPE html>
<html lang="zh-TW">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>YOLO AI Detection</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

</head>

<body>

  <div class="app">

    <div class="topbar">
      YOLO AI Detection
    </div>

    <div class="camera-container">

      <video
        id="video"
        autoplay
        playsinline
        muted
      ></video>

      <canvas id="canvas"></canvas>

    </div>

    <div class="bottom-ui">

      <button id="startBtn">
        開始偵測
      </button>

      <div id="fps">
        FPS: 0
      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
